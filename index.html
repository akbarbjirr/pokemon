<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      font-family: 'Press Start 2P', cursive;
      box-sizing: border-box;
    }

    body {
      background-color: black;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #gameContainer {
      position: relative;
      max-width: 1024px;
      max-height: 576px;
      width: 100vw;
      height: 56.25vw; /* 576/1024 * 100 */
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 20;
      align-items: flex-end;
    }

    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 5px;
      margin-right: 20px;
    }

    .dpad > div {
      width: 60px;
      height: 60px;
    }

    #controls button {
      width: 60px;
      height: 60px;
      background-color: rgba(255, 255, 255, 0.8);
      border: 2px solid black;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    #controls button:active {
      background-color: rgba(200, 200, 200, 0.8);
    }

    @media (max-width: 768px) and (orientation: portrait) {
      #controls {
        display: flex;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      #controls {
        display: flex;
        left: 20px;
        bottom: 20px;
        transform: none;
      }
    }

    @media (max-width: 768px) and (orientation: portrait) {
      #controls {
        display: flex;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      #controls {
        display: flex;
        left: 20px;
        bottom: 20px;
        transform: none;
      }
    }

    @media (max-width: 768px) {
      #userInterface > div:first-child {
        width: 200px;
        top: 20px;
        left: 20px;
      }

      #userInterface > div:nth-child(2) {
        width: 200px;
        top: 200px;
        right: 20px;
      }

      #userInterface > div:nth-child(3) {
        height: 100px;
        padding: 8px;
      }

      #attacksBox {
        grid-template-columns: 1fr;
      }

      #attackType {
        font-size: 12px;
      }
    }

    h1 {
      margin: 0;
    }

    button {
      border: 0;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #ddd;
    }
  </style>
</head>

<div id="gameContainer" style="display: inline-block; position: relative">
  <div
    id="overlappingDiv"
    style="
      background-color: black;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    "
  ></div>

  <canvas></canvas>
  <div
    id="characterDialogueBox"
    style="
      background-color: white;
      height: 140px;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-top: 4px black solid;
      display: none;
      padding: 12px;
    "
  ></div>

  <div id="userInterface" style="display: none">
    <div
      style="
        background-color: white;
        width: 250px;
        position: absolute;
        top: 50px;
        left: 50px;
        border: 4px black solid;
        padding: 12px;
      "
    >
      <h1 style="font-size: 16px">Draggle</h1>
      <div style="position: relative">
        <div
          style="height: 5px; background-color: #ccc; margin-top: 10px"
        ></div>
        <div
          id="enemyHealthBar"
          style="
            height: 5px;
            background-color: green;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
          "
        ></div>
      </div>
    </div>
    <div
      style="
        background-color: white;
        width: 250px;
        position: absolute;
        top: 330px;
        right: 50px;
        border: 4px black solid;
        padding: 12px;
      "
    >
      <h1 style="font-size: 16px">Emby</h1>
      <div style="position: relative">
        <div
          style="height: 5px; background-color: #ccc; margin-top: 10px"
        ></div>
        <div
          id="playerHealthBar"
          style="
            height: 5px;
            background-color: green;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
          "
        ></div>
      </div>
    </div>

    <div
      style="
        background-color: white;
        height: 140px;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        border-top: 4px black solid;
        display: flex;
      "
    >
      <div
        id="dialogueBox"
        style="
          position: absolute;
          top: 0;
          right: 0;
          bottom: 0;
          left: 0;
          background-color: white;
          padding: 12px;
          display: none;
          cursor: pointer;
        "
      >
        sdkfjlsdajl
      </div>
      <div
        id="attacksBox"
        style="
          width: 66.66%;
          display: grid;
          grid-template-columns: repeat(2, 1fr);
        "
      ></div>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          width: 33.33%;
          border-left: 4px black solid;
        "
      >
        <h1 id="attackType" style="font-size: 16px">Attack Type</h1>
      </div>
    </div>
  </div>
</div>

<div id="controls">
  <div class="dpad">
    <div></div>
    <button id="up">↑</button>
    <div></div>
    <button id="left">←</button>
    <button id="down">↓</button>
    <button id="right">→</button>
  </div>
  <button id="interact">A</button>
</div>

  crossorigin="anonymous"
  referrerpolicy="no-referrer"
></script>
